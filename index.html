<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garrido Lab — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070C14;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      cursor: crosshair;
    }

    /* Text sits above canvas; pointer-events: none lets clicks reach the canvas */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .coming-soon {
      font-family: "Palatino Linotype", "Palatino", "Book Antiqua", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.16em;
      color: #EEE9E0;
      text-align: center;
      text-wrap: balance;
      /* initial fade-in */
      opacity: 0;
      animation: rise 3s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }

    /* Added by JS once fade-in completes */
    .coming-soon.pulsing {
      opacity: 1;
      animation: textPulse 5s ease-in-out infinite;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Text glows orange in sync with the network auto-pulse */
    @keyframes textPulse {
      0%, 100% {
        text-shadow: 0 0 80px rgba(200, 82, 12, 0.14);
      }
      38% {
        text-shadow:
          0 0 28px rgba(248, 158, 20, 0.80),
          0 0 80px rgba(210, 90, 12, 0.40);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .coming-soon { animation: none; opacity: 1; }
      .coming-soon.pulsing { animation: none; }
    }
  </style>
</head>
<body>
  <canvas id="net"></canvas>
  <div class="stage">
    <p class="coming-soon">Coming soon&hellip;</p>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('net');
    const ctx    = canvas.getContext('2d');
    let W, H, t = 0, raf;

    /* ── Propagation config ── */
    const HOP_MS      = 62;     // ms between each network hop
    const HOP_DECAY   = 0.79;   // energy lost per hop
    const MIN_ENERGY  = 0.030;  // stop propagating below this
    const FRAME_DECAY = 0.9940; // per-frame cooling (~2s full fade at 60fps)
    const PULSE_MS    = 5000;   // auto-pulse period (must match CSS textPulse duration)

    let nodes   = [];
    let edges   = [];
    let signals = [];  // { nodeIdx, strength, arrivalMs, ch }
    let flashes = [];  // { x, y, startMs, ch }

    /* ── Thermal palettes ──
       'orange' : auto-pulse from Coming Soon text
       'green'  : user click                         */
    const PAL = {
      orange: [
        [  7,  12,  20 ],   // 0.00 – background dark
        [ 88,  27,   5 ],   // 0.25 – dark burnt
        [210,  72,   8 ],   // 0.50 – orange
        [242, 148,  12 ],   // 0.75 – amber
        [255, 220,  90 ],   // 1.00 – golden white
      ],
      green: [
        [  7,  12,  20 ],   // 0.00 – background dark
        [  5,  46,  19 ],   // 0.25 – deep forest
        [ 12, 105,  40 ],   // 0.50 – forest green
        [ 22, 158,  65 ],   // 0.75 – medium green
        [ 55, 210,  98 ],   // 1.00 – bright green
      ],
    };

    function thermalRgb(e, ch) {
      const stops = PAL[ch];
      const x = Math.max(0, Math.min(0.9999, e)) * (stops.length - 1);
      const i = x | 0, f = x - i;
      const [r0,g0,b0] = stops[i], [r1,g1,b1] = stops[i + 1];
      return [ (r0 + (r1-r0)*f)|0, (g0 + (g1-g0)*f)|0, (b0 + (b1-b0)*f)|0 ];
    }

    function blendRgb(rgb0, w0, rgb1, w1) {
      const tot = w0 + w1;
      return [
        ((rgb0[0]*w0 + rgb1[0]*w1) / tot)|0,
        ((rgb0[1]*w0 + rgb1[1]*w1) / tot)|0,
        ((rgb0[2]*w0 + rgb1[2]*w1) / tot)|0,
      ];
    }

    function resolveRgb(eo, eg) {
      if (eo < 0.003 && eg < 0.003) return null;
      if (eo < 0.003) return { rgb: thermalRgb(eg, 'green'),  e: eg };
      if (eg < 0.003) return { rgb: thermalRgb(eo, 'orange'), e: eo };
      return {
        rgb: blendRgb(thermalRgb(eo, 'orange'), eo, thermalRgb(eg, 'green'), eg),
        e:   Math.max(eo, eg),
      };
    }

    /* ── Graph generation ── */
    function buildGraph() {
      nodes = []; edges = []; signals = []; flashes = [];

      const count  = Math.max(120, (W * H / 5000)|0);
      const connR  = Math.min(W, H) * 0.155;
      const minSep = Math.min(W, H) * 0.030;
      const maxDeg = 5, pad = 40;

      let tries = 0;
      while (nodes.length < count && tries < count * 25) {
        tries++;
        const x = pad + Math.random() * (W - pad*2);
        const y = pad + Math.random() * (H - pad*2);
        let ok = true;
        for (const n of nodes) {
          const dx = n.x - x, dy = n.y - y;
          if (dx*dx + dy*dy < minSep*minSep) { ok = false; break; }
        }
        if (ok) nodes.push({
          x, y,
          r:         2.5 + Math.random() * 3.5,
          phase:     Math.random() * Math.PI * 2,
          energyO:   0,
          energyG:   0,
          neighbors: [],
        });
      }

      for (let i = 0; i < nodes.length; i++) {
        const cands = [];
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < connR) cands.push({ j, d });
        }
        cands.sort((a, b) => a.d - b.d);
        for (const { j } of cands) {
          if (nodes[i].neighbors.length >= maxDeg) break;
          if (nodes[j].neighbors.length >= maxDeg) continue;
          nodes[i].neighbors.push(j);
          nodes[j].neighbors.push(i);
          edges.push({ a: i, b: j });
        }
      }
    }

    /* ── Fire a heat signal ── */
    function fire(x, y, ch = 'green', strength = 1.0) {
      const R   = Math.min(W, H) * 0.07;
      const now = performance.now();
      flashes.push({ x, y, startMs: now, ch });

      const hit = [];
      for (let i = 0; i < nodes.length; i++) {
        const d = Math.hypot(nodes[i].x - x, nodes[i].y - y);
        if (d < R) hit.push({ i, d });
      }
      hit.sort((a, b) => a.d - b.d);
      for (const { i } of hit.slice(0, 3)) {
        signals.push({ nodeIdx: i, strength, arrivalMs: now, ch });
      }
    }

    /* ── Simulation step ── */
    function processSignals() {
      const now  = performance.now();
      const next = [];
      for (const s of signals) {
        if (s.arrivalMs > now) { next.push(s); continue; }
        const n  = nodes[s.nodeIdx];
        const ek = s.ch === 'orange' ? 'energyO' : 'energyG';
        // Compare against current energy, not a stored peak threshold.
        // Reflected signals are always weaker (HOP_DECAY^2 per round-trip),
        // so this prevents cycles while allowing the next pulse to propagate
        // as soon as the previous one has partially decayed.
        if (s.strength > n[ek]) {
          n[ek] = Math.min(1, s.strength);
          const child = s.strength * HOP_DECAY;
          if (child > MIN_ENERGY) {
            for (const ni of n.neighbors) {
              next.push({ nodeIdx: ni, strength: child, arrivalMs: now + HOP_MS, ch: s.ch });
            }
          }
        }
      }
      signals = next;
    }

    function decayNodes() {
      for (const n of nodes) {
        n.energyO *= FRAME_DECAY;
        n.energyG *= FRAME_DECAY;
        if (n.energyO < 0.003) n.energyO = 0;
        if (n.energyG < 0.003) n.energyG = 0;
      }
    }

    /* ── Draw ── */
    function drawFlashes() {
      const now = performance.now();
      flashes = flashes.filter(f => {
        const age = (now - f.startMs) / 480;
        if (age >= 1) return false;
        const ease = 1 - (1 - age) * (1 - age);
        const [r, g, b] = thermalRgb(1 - age * 0.5, f.ch);
        ctx.beginPath();
        ctx.arc(f.x, f.y, 4 + ease * 46, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${r},${g},${b},${(1 - age) * 0.55})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        return true;
      });
    }

    function drawEdges() {
      for (const { a, b } of edges) {
        const na = nodes[a], nb = nodes[b];
        const ra = resolveRgb(na.energyO, na.energyG);
        const rb = resolveRgb(nb.energyO, nb.energyG);

        if (!ra && !rb) {
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.strokeStyle = 'rgba(40,65,120,0.08)';
          ctx.lineWidth   = 0.55;
          ctx.stroke();
        } else {
          const ca = ra ? ra.rgb : [40, 65, 120];
          const ea = ra ? ra.e   : 0;
          const cb = rb ? rb.rgb : [40, 65, 120];
          const eb = rb ? rb.e   : 0;

          const grad = ctx.createLinearGradient(na.x, na.y, nb.x, nb.y);
          grad.addColorStop(0, `rgba(${ca[0]},${ca[1]},${ca[2]},${ea > 0.01 ? 0.08 + ea*0.58 : 0.05})`);
          grad.addColorStop(1, `rgba(${cb[0]},${cb[1]},${cb[2]},${eb > 0.01 ? 0.08 + eb*0.58 : 0.05})`);
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.strokeStyle = grad;
          ctx.lineWidth   = 0.6 + Math.max(ea, eb) * 1.35;
          ctx.stroke();
        }
      }
    }

    function drawNodes() {
      for (const n of nodes) {
        const res = resolveRgb(n.energyO, n.energyG);

        if (!res) {
          /* Resting — dim with gentle breathing */
          const pulse = 1 + 0.05 * Math.sin(t * 0.7 + n.phase);
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
          ctx.fillStyle   = 'rgba(30,52,88,0.40)';
          ctx.fill();
          ctx.strokeStyle = 'rgba(52,82,145,0.15)';
          ctx.lineWidth   = 0.5;
          ctx.stroke();
        } else {
          const { rgb: [r, g, b], e } = res;

          /* Radial glow halo */
          const glowR = n.r * (4 + e * 8);
          const glow  = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
          glow.addColorStop(0,    `rgba(${r},${g},${b},${0.48 * e})`);
          glow.addColorStop(0.35, `rgba(${r},${g},${b},${0.14 * e})`);
          glow.addColorStop(1,    `rgba(${r},${g},${b},0)`);
          ctx.beginPath();
          ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();

          /* Bright core */
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * (1 + e * 0.55), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},0.92)`;
          ctx.fill();
        }
      }
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);
      processSignals();
      decayNodes();
      drawFlashes();
      drawEdges();
      drawNodes();
      t  += 0.016;
      raf = requestAnimationFrame(frame);
    }

    /* ── Events ── */
    canvas.addEventListener('click', e => {
      const r = canvas.getBoundingClientRect();
      fire(e.clientX - r.left, e.clientY - r.top, 'green');
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      for (const touch of e.changedTouches) {
        fire(touch.clientX - r.left, touch.clientY - r.top, 'green');
      }
    }, { passive: false });

    /* ── Init ── */
    function init() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGraph();
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { cancelAnimationFrame(raf); init(); frame(); }, 150);
    });

    init();
    frame();

    /* Intro pulse at 1.3s — orange, shows the network before text fully appears */
    setTimeout(() => fire(W / 2, H / 2, 'orange', 1.0), 1300);

    /* Once the fade-in animation completes (~3.7s), switch text to pulsing mode
       and start the repeating orange auto-pulse from center.
       CSS textPulse peaks at 38% ≈ 1330ms; we fire the network ~200ms after
       the CSS cycle starts so the glow and the heat wave peak feel simultaneous. */
    setTimeout(() => {
      document.querySelector('.coming-soon').classList.add('pulsing');

      function autoPulse() {
        setTimeout(() => fire(W / 2, H / 2, 'orange', 1.0), 200);
      }
      autoPulse();
      setInterval(autoPulse, PULSE_MS);
    }, 3700);
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garrido Lab — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070C14;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
      cursor: crosshair;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .coming-soon {
      font-family: "Palatino Linotype", "Palatino", "Book Antiqua", Georgia, serif;
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.16em;
      color: #EEE9E0;
      text-align: center;
      text-wrap: balance;
      opacity: 0;
      animation: rise 3s cubic-bezier(0.16, 1, 0.3, 1) 0.7s forwards;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .coming-soon { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="net"></canvas>
  <div class="stage">
    <p class="coming-soon">Coming soon&hellip;</p>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('net');
    const ctx    = canvas.getContext('2d');
    let W, H, t = 0, raf;

    const HOP_MS      = 62;
    const HOP_DECAY   = 0.79;
    const MIN_ENERGY  = 0.030;
    const FRAME_DECAY = 0.9940;

    let nodes   = [];
    let edges   = [];
    let signals = [];
    let flashes = [];

    const PAL = {
      orange: [
        [  7,  12,  20 ],
        [ 88,  27,   5 ],
        [210,  72,   8 ],
        [242, 148,  12 ],
        [255, 220,  90 ],
      ],
      red: [
        [  7,  12,  20 ],
        [ 60,   8,   8 ],
        [150,  18,  15 ],
        [210,  38,  28 ],
        [255,  85,  65 ],
      ],
      blue: [
        [  7,  12,  20 ],
        [  8,  18,  62 ],
        [ 18,  48, 145 ],
        [ 38,  88, 205 ],
        [ 80, 148, 255 ],
      ],
      green: [
        [  7,  12,  20 ],
        [  5,  46,  19 ],
        [ 12, 105,  40 ],
        [ 22, 158,  65 ],
        [ 55, 210,  98 ],
      ],
      yellow: [
        [  7,  12,  20 ],
        [ 52,  38,   5 ],
        [138, 108,  10 ],
        [208, 168,  18 ],
        [255, 228,  55 ],
      ],
    };

    /* Click color cycle — advances on each click/touch */
    const CLICK_CYCLE = ['red', 'blue', 'green', 'yellow'];
    let clickIdx = 0;
    let clickCh  = CLICK_CYCLE[0]; // palette used to render energyG

    function thermalRgb(e, ch) {
      const stops = PAL[ch];
      const x = Math.max(0, Math.min(0.9999, e)) * (stops.length - 1);
      const i = x | 0, f = x - i;
      const [r0,g0,b0] = stops[i], [r1,g1,b1] = stops[i + 1];
      return [ (r0 + (r1-r0)*f)|0, (g0 + (g1-g0)*f)|0, (b0 + (b1-b0)*f)|0 ];
    }

    function blendRgb(rgb0, w0, rgb1, w1) {
      const tot = w0 + w1;
      return [
        ((rgb0[0]*w0 + rgb1[0]*w1) / tot)|0,
        ((rgb0[1]*w0 + rgb1[1]*w1) / tot)|0,
        ((rgb0[2]*w0 + rgb1[2]*w1) / tot)|0,
      ];
    }

    function resolveRgb(eo, eg) {
      if (eo < 0.003 && eg < 0.003) return null;
      if (eo < 0.003) return { rgb: thermalRgb(eg, clickCh),   e: eg };
      if (eg < 0.003) return { rgb: thermalRgb(eo, 'orange'),  e: eo };
      return {
        rgb: blendRgb(thermalRgb(eo, 'orange'), eo, thermalRgb(eg, clickCh), eg),
        e:   Math.max(eo, eg),
      };
    }

    /* ── Layered node placement ──
       y is sampled from a power distribution biased toward the bottom:
         y = (H - pad*2) * u^alpha   where u ~ Uniform(0,1)
       alpha < 1  →  PDF = (1/alpha) * t^(1/alpha - 1), increasing with t
       alpha = 0.38 gives a clear sparse-top / dense-bottom gradient.

       x spread widens slightly toward the bottom so the density feels
       organic rather than uniformly banded.                             */
    function layeredY(H, pad) {
      const alpha = 0.38;
      return pad + (H - pad * 2) * Math.pow(Math.random(), alpha);
    }

    function buildGraph() {
      nodes = []; edges = []; signals = []; flashes = [];

      /* ~40% more nodes than the uniform version to fill the dense bottom */
      const count  = Math.max(160, (W * H / 3600)|0);
      const connR  = Math.min(W, H) * 0.150;
      /* smaller minSep so the dense bottom region can pack tighter */
      const minSep = Math.min(W, H) * 0.025;
      const maxDeg = 5, pad = 40;

      let tries = 0;
      while (nodes.length < count && tries < count * 30) {
        tries++;
        /* x: uniform with slight noise — wider spread toward bottom */
        const yNorm = Math.random(); // 0 = top, 1 = bottom (for spread calc)
        const spreadFactor = 0.7 + yNorm * 0.3; // 0.7 at top → 1.0 at bottom
        const xRange = (W - pad * 2) * spreadFactor;
        const xOff   = (W - pad * 2 - xRange) / 2;
        const x = pad + xOff + Math.random() * xRange;
        const y = layeredY(H, pad);

        let ok = true;
        for (const n of nodes) {
          const dx = n.x - x, dy = n.y - y;
          if (dx*dx + dy*dy < minSep*minSep) { ok = false; break; }
        }
        if (ok) nodes.push({
          x, y,
          r:         2.5 + Math.random() * 3.5,
          phase:     Math.random() * Math.PI * 2,
          energyO:   0,
          energyG:   0,
          neighbors: [],
        });
      }

      for (let i = 0; i < nodes.length; i++) {
        const cands = [];
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < connR) cands.push({ j, d });
        }
        cands.sort((a, b) => a.d - b.d);
        for (const { j } of cands) {
          if (nodes[i].neighbors.length >= maxDeg) break;
          if (nodes[j].neighbors.length >= maxDeg) continue;
          nodes[i].neighbors.push(j);
          nodes[j].neighbors.push(i);
          edges.push({ a: i, b: j });
        }
      }
    }

    function fire(x, y, ch = 'green', strength = 1.0) {
      const R   = Math.min(W, H) * 0.07;
      const now = performance.now();
      flashes.push({ x, y, startMs: now, ch });

      const hit = [];
      for (let i = 0; i < nodes.length; i++) {
        const d = Math.hypot(nodes[i].x - x, nodes[i].y - y);
        if (d < R) hit.push({ i, d });
      }
      hit.sort((a, b) => a.d - b.d);
      for (const { i } of hit.slice(0, 3)) {
        signals.push({ nodeIdx: i, strength, arrivalMs: now, ch });
      }
    }

    function processSignals() {
      const now  = performance.now();
      const next = [];
      for (const s of signals) {
        if (s.arrivalMs > now) { next.push(s); continue; }
        const n  = nodes[s.nodeIdx];
        const ek = s.ch === 'orange' ? 'energyO' : 'energyG';
        if (s.strength > n[ek]) {
          n[ek] = Math.min(1, s.strength);
          const child = s.strength * HOP_DECAY;
          if (child > MIN_ENERGY) {
            for (const ni of n.neighbors) {
              next.push({ nodeIdx: ni, strength: child, arrivalMs: now + HOP_MS, ch: s.ch });
            }
          }
        }
      }
      signals = next;
    }

    function decayNodes() {
      for (const n of nodes) {
        n.energyO *= FRAME_DECAY;
        n.energyG *= FRAME_DECAY;
        if (n.energyO < 0.003) n.energyO = 0;
        if (n.energyG < 0.003) n.energyG = 0;
      }
    }

    function drawFlashes() {
      const now = performance.now();
      flashes = flashes.filter(f => {
        const age = (now - f.startMs) / 480;
        if (age >= 1) return false;
        const ease = 1 - (1 - age) * (1 - age);
        const [r, g, b] = thermalRgb(1 - age * 0.5, f.ch);
        ctx.beginPath();
        ctx.arc(f.x, f.y, 4 + ease * 46, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${r},${g},${b},${(1 - age) * 0.55})`;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        return true;
      });
    }

    function drawEdges() {
      for (const { a, b } of edges) {
        const na = nodes[a], nb = nodes[b];
        const ra = resolveRgb(na.energyO, na.energyG);
        const rb = resolveRgb(nb.energyO, nb.energyG);

        if (!ra && !rb) {
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.strokeStyle = 'rgba(40,65,120,0.08)';
          ctx.lineWidth   = 0.55;
          ctx.stroke();
        } else {
          const ca = ra ? ra.rgb : [40, 65, 120];
          const ea = ra ? ra.e   : 0;
          const cb = rb ? rb.rgb : [40, 65, 120];
          const eb = rb ? rb.e   : 0;

          const grad = ctx.createLinearGradient(na.x, na.y, nb.x, nb.y);
          grad.addColorStop(0, `rgba(${ca[0]},${ca[1]},${ca[2]},${ea > 0.01 ? 0.08 + ea*0.58 : 0.05})`);
          grad.addColorStop(1, `rgba(${cb[0]},${cb[1]},${cb[2]},${eb > 0.01 ? 0.08 + eb*0.58 : 0.05})`);
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.strokeStyle = grad;
          ctx.lineWidth   = 0.6 + Math.max(ea, eb) * 1.35;
          ctx.stroke();
        }
      }
    }

    function drawNodes() {
      for (const n of nodes) {
        const res = resolveRgb(n.energyO, n.energyG);
        const pulse = 1 + 0.05 * Math.sin(t * 0.7 + n.phase);

        /* Always draw the resting base so nodes never dip below ambient
           brightness as energy decays — prevents the dark-then-pop artifact. */
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * pulse, 0, Math.PI * 2);
        ctx.fillStyle   = 'rgba(30,52,88,0.40)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(52,82,145,0.15)';
        ctx.lineWidth   = 0.5;
        ctx.stroke();

        if (res) {
          const { rgb: [r, g, b], e } = res;

          const glowR = n.r * (4 + e * 8);
          const glow  = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
          glow.addColorStop(0,    `rgba(${r},${g},${b},${0.48 * e})`);
          glow.addColorStop(0.35, `rgba(${r},${g},${b},${0.14 * e})`);
          glow.addColorStop(1,    `rgba(${r},${g},${b},0)`);
          ctx.beginPath();
          ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
          ctx.fillStyle = glow;
          ctx.fill();

          /* Fade core opacity with energy so it doesn't paint a near-black
             circle over the resting base as the pulse decays to zero. */
          const coreAlpha = 0.92 * Math.min(1, e / 0.15);
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r * (1 + e * 0.55), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},${coreAlpha})`;
          ctx.fill();
        }
      }
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);
      processSignals();
      decayNodes();
      drawFlashes();
      drawEdges();
      drawNodes();
      t  += 0.016;
      raf = requestAnimationFrame(frame);
    }

    function nextClickColor() {
      clickIdx = (clickIdx + 1) % CLICK_CYCLE.length;
      clickCh  = CLICK_CYCLE[clickIdx];
    }

    canvas.addEventListener('click', e => {
      const r = canvas.getBoundingClientRect();
      fire(e.clientX - r.left, e.clientY - r.top, 'green');
      nextClickColor();
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      for (const touch of e.changedTouches) {
        fire(touch.clientX - r.left, touch.clientY - r.top, 'green');
      }
      nextClickColor();
    }, { passive: false });

    function init() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      buildGraph();
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { cancelAnimationFrame(raf); init(); frame(); }, 150);
    });

    init();
    frame();

    /* Every 10s fire a pulse from a random node in the top 22% of the canvas.
       Uses the orange channel so it's visually distinct from click pulses. */
    setInterval(() => {
      const cutoff = H * 0.22;
      const top = nodes.filter(n => n.y < cutoff);
      if (top.length === 0) return;
      const n = top[Math.floor(Math.random() * top.length)];
      fire(n.x, n.y, 'orange', 1.0);
    }, 10000);

  })();
  </script>
</body>
</html>
